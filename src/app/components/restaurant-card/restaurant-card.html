<div class="card">
    <span class="restaurant-name ">  {{resto().name }}</span>
    <span class="district"> {{ resto().district }}</span>
    <span class="specialty"> {{ resto().specialty }}</span>
    <app-start-rating [star]="resto().currentRating" (starClick)="onStarClick($event)" class="rating-section"></app-start-rating>  
</div>
